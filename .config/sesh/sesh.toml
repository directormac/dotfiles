#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

[[session]]
name = "dotfiles"
path = "~/.dotfiles"
startup_command = "nvim"

# Auto-start nvim for sessions in these directories
[[wildcard]]
pattern = "~/.dotfiles/*"
startup_command = "nvim"

[[wildcard]]
pattern = "~/projects/*"
startup_command = "nvim"

[[wildcard]]
pattern = "~/work/*"
startup_command = "nvim"
